<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linea del timepo</title>

<style>

body{
    background: #ffb6c1;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

#corazon{
    width: 220px;
    max-width: 80vw;
    cursor: pointer;
    margin-top: 80px;
    transition: 1s;
}

/* Animación de subir y desaparecer */
.subir{
    transform: translateY(-200px) scale(0.2);
    opacity: 0;
}

#textoClic{
    font-size: 22px;
    color: white;
    font-weight: bold;
}

#contenido{
    display: none;
    margin-top: 20px;
}

#pregunta{
    font-size: 32px;
    color: white;
    font-weight: bold;
    margin-bottom: 10px;
}

#imagen_principal, #foto{
    width: 220px;
    max-width: 80vw;
    border-radius: 15px;
    margin: 10px;
}

button{
    padding: 12px 25px;
    font-size: 18px;
    margin: 8px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    background: white;
    font-weight: bold;
}

button:hover{
    background: hotpink;
    color: white;
}

#yupi{
    width: 150px;
    margin-top: 15px;
}

</style>
</head>

<body>

<div id="inicio">
    <img id="corazon" src="imagenes/corazon_cerrado.png" onclick="abrir()">
    <div id="textoClic">Clic aquí 💘</div>
</div>

<div id="contenido">
    <div id="pregunta">¿Quieres ser mi San Valentín? 💖</div>

    <img id="imagen_principal" src="imagenes/imagen_principal.png"><br>
    <img id="foto" src="imagenes/foto.png"><br>

    <div id="botones">
        <button onclick="decirSi()">Sí 💕</button>
        <button onclick="decirNo()">No 😢</button>
    </div>

    <div id="respuesta"></div>
</div>

<script>

function abrir(){
    let corazon = document.getElementById("corazon");
    corazon.classList.add("subir");

    setTimeout(()=>{
        document.getElementById("inicio").style.display="none";
        document.getElementById("contenido").style.display="block";
    },1000);
}

function decirNo(){
    document.getElementById("respuesta").innerHTML = `
        <h2 style="color:white;">¿Seguro? 🤨</h2>
        <button onclick="decirSi()">Sí</button>
        <button onclick="decirNo()">No</button>
    `;
}

function decirSi(){
    document.getElementById("respuesta").innerHTML = `
        <h2 style="color:white;">YUPI 😍</h2>
        <img id="yupi" src="imagenes/yupi.gif"><br><br>
        <button onclick="volver()">Cambio de opinión</button>
    `;
}

function volver(){
    document.getElementById("respuesta").innerHTML = "";
}

</script>

</body>
</html>
