<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>San Valentín 💖</title>

<style>

body{
    background: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

#contenedor{
    position: relative;
    width: 300px;
    max-width: 90vw;
    margin: auto;
    margin-top: 60px;
}

.corazon{
    position: absolute;
    width: 150px;
    transition: 1s;
}

#corazon_izq{
    left: 0;
}

#corazon_der{
    right: 0;
}

#corazon_cerrado{
    width: 100%;
    cursor: pointer;
}

#contenido{
    display: none;
    margin-top: 20px;
}

#imagen_principal{
    width: 200px;
    max-width: 80vw;
    border-radius: 15px;
}

#foto{
    width: 200px;
    max-width: 80vw;
    border-radius: 15px;
    margin-top: 15px;
}

button{
    padding: 10px 20px;
    font-size: 16px;
    margin: 5px;
    border: none;
    background: pink;
    border-radius: 10px;
    cursor: pointer;
}

button:hover{
    background: hotpink;
}

#yupi{
    width: 120px;
    margin-top: 20px;
}

</style>
</head>

<body>

<div id="contenedor">

    <!-- CORAZÓN CERRADO -->
    <img id="corazon_cerrado" src="imagenes/corazon_cerrado.png" onclick="abrirCorazon()">

    <!-- CORAZÓN PARTIDO -->
    <img id="corazon_izq" class="corazon" src="imagenes/corazon_izq.png">
    <img id="corazon_der" class="corazon" src="imagenes/corazon_der.png">

</div>

<div id="contenido">
    <h2>¿Quieres ser mi San Valentín? 💖</h2>

    <img id="imagen_principal" src="imagenes/imagen_principal.png"><br>

    <img id="foto" src="imagenes/foto.png"><br>

    <button onclick="cambiarFoto()">Cambiar foto</button>

    <br>
    <img id="yupi" src="imagenes/yupi.gif">
</div>


<script>

let fotos = ["foto.png"];
let indice = 0;

function abrirCorazon(){
    document.getElementById("corazon_cerrado").style.display = "none";

    document.getElementById("corazon_izq").style.left = "-180px";
    document.getElementById("corazon_der").style.right = "-180px";

    document.getElementById("contenido").style.display = "block";
}

function cambiarFoto(){
    indice++;
    if(indice >= fotos.length){
        indice = 0;
    }
    document.getElementById("foto").src = "imagenes/" + fotos[indice];
}

</script>

</body>
</html>
