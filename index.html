<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>San Valentín 💖</title>

<style>
body {
    background: pink;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
}

#corazonInicio {
    width: 300px;
    cursor: pointer;
}

#corazonContainer {
    position: relative;
    display: none;
}

.corazonParte {
    width: 180px;
}

#izq {
    position: absolute;
    left: -100px;
    transition: 1s;
}

#der {
    position: absolute;
    right: -100px;
    transition: 1s;
}

#foto {
    width: 150px;
    border-radius: 20px;
    display: none;
}

#principal {
    width: 200px;
    display: none;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: red;
    color: white;
    cursor: pointer;
    margin: 10px;
}

button:hover {
    background: darkred;
}

#pregunta, #respuesta {
    font-size: 26px;
    margin-top: 15px;
    display: none;
}
</style>
</head>

<body>

<!-- CORAZÓN INICIAL -->
<div id="inicio">
    <img id="corazonInicio" src="imagenes/corazon_cerrado.png">
    <h2>Clic aquí 💖</h2>
</div>

<!-- CORAZÓN PARTIDO -->
<div id="corazonContainer">
    <img id="izq" class="corazonParte" src="imagenes/corazon_izq.png">
    <img id="der" class="corazonParte" src="imagenes/corazon_der.png">
</div>

<!-- Imagen detrás del corazón -->
<img id="foto" src="imagenes/foto.png">

<!-- Imagen principal arriba de la pregunta -->
<img id="principal" src="imagenes/imagen_principal.png">

<div id="pregunta">¿Quieres ser mi San Valentín? 💘</div>

<div id="botones">
    <button id="siBtn" style="display:none;">Sí</button>
    <button id="noBtn" style="display:none;">No</button>
</div>

<div id="respuesta"></div>

<script>
let corazonInicio = document.getElementById("corazonInicio");
let inicio = document.getElementById("inicio");
let izq = document.getElementById("izq");
let der = document.getElementById("der");
let foto = document.getElementById("foto");
let principal = document.getElementById("principal");
let pregunta = document.getElementById("pregunta");
let siBtn = document.getElementById("siBtn");
let noBtn = document.getElementById("noBtn");
let respuesta = document.getElementById("respuesta");
let contenedor = document.getElementById("corazonContainer");

// CLICK AL CORAZÓN
corazonInicio.onclick = function() {
    inicio.style.display = "none";
    contenedor.style.display = "block";

    // Abrir corazón
    setTimeout(() => {
        izq.style.left = "-200px";
        der.style.right = "-200px";
        foto.style.display = "block";
        principal.style.display = "block";
        pregunta.style.display = "block";
        siBtn.style.display = "inline-block";
        noBtn.style.display = "inline-block";
    }, 500);
};

// SI
siBtn.onclick = function() {
    pregunta.style.display = "none";
    siBtn.style.display = "none";
    noBtn.style.display = "none";
   respuesta.innerHTML = "YUPI 😍<br><img src='imagenes/yupi.gif' width='200'>";
    respuesta.style.display = "block";
};

// NO (bucle infinito)
noBtn.onclick = function() {
    respuesta.innerHTML = "¿Seguro? 🤨";
    respuesta.style.display = "block";
};
</script>

</body>
</html>
